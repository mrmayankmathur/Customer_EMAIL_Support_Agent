name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force "https://token:$HF_TOKEN@huggingface.co/spaces/mrmayankmathurorg/Customer-EMAIL-Agent" main
