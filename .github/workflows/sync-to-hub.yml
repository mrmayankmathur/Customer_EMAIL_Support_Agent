name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        uses: huggingface/github-action@v1
        with:
          factory_repo: mrmayankmathur/Customer_EMAIL_Support_Agent
          space_id: mrmayankmathurorg/Customer-EMAIL-Agent
          hf_token: ${{ secrets.HF_TOKEN }}
