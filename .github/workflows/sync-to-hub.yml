name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # We delete the .git folder, re-init, and force push so HF only gets the CLEAN current state, without the problematic history.
        run: |
          rm -rf .git
          git init -b main
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Initial sync to Hugging Face"
          git remote add origin "https://mrmayankmathurorg:$HF_TOKEN@huggingface.co/spaces/mrmayankmathurorg/Customer-EMAIL-Agent"
          git push --force origin main
